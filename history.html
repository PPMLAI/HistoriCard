<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIMPATI LAI - History Card Mesin</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#f4f6f9;
}

header{
background:linear-gradient(135deg,#003366,#005baa);
color:white;
padding:20px;
display:flex;
align-items:center;
gap:20px;
box-shadow:0 4px 10px rgba(0,0,0,.2);
}

.logo{
width:70px;
height:70px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
font-weight:bold;
color:#005baa;
}

.header-text h1{
font-size:28px;
}

.header-text p{
opacity:.9;
}

.summary{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
padding:20px;
}

.box{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 3px 10px rgba(0,0,0,.1);
text-align:center;
}

.box h2{
color:#005baa;
font-size:30px;
}

.search{
padding:0 20px 20px;
}

.search input{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ccc;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
border-radius:15px;
padding:20px;
box-shadow:0 3px 10px rgba(0,0,0,.15);
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card h3{
color:#005baa;
margin-bottom:10px;
}

.card p{
margin-bottom:5px;
font-size:14px;
}

.btn{
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

.btn-primary{
background:#005baa;
color:white;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.5);
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
padding:25px;
border-radius:15px;
width:90%;
max-width:600px;
max-height:90vh;
overflow:auto;
}

.modal-content h2{
margin-bottom:15px;
color:#005baa;
}

input,select,textarea{
width:100%;
padding:10px;
margin-bottom:10px;
border:1px solid #ccc;
border-radius:8px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

table th{
background:#005baa;
color:white;
padding:8px;
}

table td{
padding:8px;
border:1px solid #ddd;
font-size:13px;
}

.close{
float:right;
cursor:pointer;
font-size:22px;
color:red;
}

.footer{
padding:15px;
text-align:center;
background:#003366;
color:white;
margin-top:20px;
}
</style>
</head>

<body>

<header>
<div class="logo">LAI</div>
<div class="header-text">
<h1>Histori CARD</h1>
<p>Sistem Informasi Maintenance Mesin Percetakan LAI</p>
</div>
</header>

<div class="summary">
<div class="box">
<h2 id="totalMesin">30</h2>
<p>Total Mesin</p>
</div>

<div class="box">
<h2 id="totalHistory">0</h2>
<p>Total History</p>
</div>

<div class="box">
<h2 id="totalPM">0</h2>
<p>Total Maintenance</p>
</div>
</div>

<div class="search">
<input type="text" id="search" placeholder="Cari Mesin...">
</div>

<div class="container" id="machineContainer"></div>

<div class="modal" id="historyModal">
<div class="modal-content">

<span class="close" onclick="closeModal()">&times;</span>

<h2 id="modalTitle"></h2>

<form id="historyForm">

<input type="date" id="tanggal" required>

<input type="text" id="teknisi"
placeholder="Nama Teknisi" required>

<select id="jenis">
<option>Preventive Maintenance</option>
<option>Corrective Maintenance</option>
<option>Breakdown</option>
</select>

<input type="text" id="sparepart"
placeholder="Sparepart Diganti">

<textarea id="keterangan"
placeholder="Keterangan"></textarea>

<select id="status">
<option>Normal</option>
<option>Perlu Monitoring</option>
<option>Rusak</option>
</select>

<button type="submit" class="btn btn-primary">
Simpan History
</button>

</form>

<table>
<thead>
<tr>
<th>Tanggal</th>
<th>Teknisi</th>
<th>Jenis</th>
<th>Sparepart</th>
<th>Status</th>
</tr>
</thead>

<tbody id="historyTable"></tbody>
</table>

</div>
</div>

<div class="footer">
© 2026 GUSPUR PPM LAI - History Card Mesin Percetakan
</div>

<script>

const mesinList = [
"Mesin CTCP",
"Mesin Polar 92",
"Mesin Goss 1",
"Mesin Goss 2",
"Mesin SM",
"Mesin Counter Stacker",
"Mesin Stahlfolder",
"Mesin Gathering",
"Mesin Ventura 1",
"Mesin Ventura 2",
"Mesin Ventura 3",
"Mesin BBL 30",
"Mesin 3 Knife",
"Mesin BL 500",
"Mesin EP",
"Mesin Pilung",
"Mesin Jahit Kawat",
"Mesin Meiwa",
"Mesin Shrink LC6000",
"Mesin Shrink Polypack",
"Mesin Genset Cummins Lama",
"Mesin Genset Cummins Baru",
"Mesin Genset Server",
"Kompressor BOGE",
"Kompressor KAISHAN",
"Kompressor MMI 1",
"Kompressor MMI 2",
"POLAR 115",
"Mesin ROUND CORNER 1",
"Mesin ROUND CORNER 2"
];

let currentMachine="";

function renderMachines(){

const container=document.getElementById("machineContainer");
container.innerHTML="";

mesinList.forEach(mesin=>{

const data=getHistory(mesin);

const last=data.length ?
data[data.length-1].tanggal :
"-";

container.innerHTML+=`
<div class="card">
<h3>${mesin}</h3>

<p>Total History : ${data.length}</p>
<p>Terakhir Maintenance : ${last}</p>

<button class="btn btn-primary"
onclick="openMachine('${mesin}')">
Lihat History
</button>
</div>
`;

});

updateSummary();
}

function getHistory(machine){
return JSON.parse(
localStorage.getItem(machine) || "[]"
);
}

function saveHistory(machine,data){

let history=getHistory(machine);

history.push(data);

localStorage.setItem(
machine,
JSON.stringify(history)
);
}

function openMachine(machine){

currentMachine=machine;

document.getElementById("modalTitle")
.innerText=machine;

document.getElementById("historyModal")
.style.display="flex";

loadHistory(machine);
}

function closeModal(){
document.getElementById("historyModal")
.style.display="none";
}

function loadHistory(machine){

let data=getHistory(machine);

let html="";

data.forEach(item=>{

html+=`
<tr>
<td>${item.tanggal}</td>
<td>${item.teknisi}</td>
<td>${item.jenis}</td>
<td>${item.sparepart}</td>
<td>${item.status}</td>
</tr>
`;

});

document.getElementById("historyTable")
.innerHTML=html;
}

document.getElementById("historyForm")
.addEventListener("submit",function(e){

e.preventDefault();

saveHistory(currentMachine,{

tanggal:
document.getElementById("tanggal").value,

teknisi:
document.getElementById("teknisi").value,

jenis:
document.getElementById("jenis").value,

sparepart:
document.getElementById("sparepart").value,

keterangan:
document.getElementById("keterangan").value,

status:
document.getElementById("status").value

});

this.reset();

loadHistory(currentMachine);
renderMachines();

});

function updateSummary(){

let total=0;

mesinList.forEach(m=>{

total+=getHistory(m).length;

});

document.getElementById("totalHistory")
.innerText=total;

document.getElementById("totalPM")
.innerText=total;
}

document.getElementById("search")
.addEventListener("keyup",function(){

const keyword=this.value.toLowerCase();

const cards=document.querySelectorAll(".card");

cards.forEach(card=>{

card.style.display=
card.innerText.toLowerCase()
.includes(keyword)
?"block":"none";

});

});

renderMachines();

</script>

</body>
</html>
